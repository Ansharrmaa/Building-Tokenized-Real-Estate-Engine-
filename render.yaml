services:
  - type: web
    name: tokenized-real-estate-engine
    env: docker
    region: frankfurt
    plan: free
    dockerCommand: /app/start.sh
    disk:
      name: data-storage
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:///data/real_estate.db?mode=rwc
      - key: MEILISEARCH_API_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
